{{ define "main" }}
<section class="band">
  <div class="wrap narrow">
    <h1>{{ .Title }}</h1>
    {{ with .Content }}<div class="prose">{{ . }}</div>{{ end }}
    <div class="post-list">
      {{ range .RegularPages.ByDate.Reverse }}
      <a class="post-row" href="{{ .RelPermalink }}">
        <span class="post-date muted">{{ .Date.Format "2006-01-02" }}</span>
        <span class="post-title">{{ .Title }}</span>
      </a>
      {{ end }}
    </div>
    <p class="muted fine">Subscribe via <a href="{{ "devlog/index.xml" | relURL }}">RSS</a> or
    <a href="{{ "/" | relURL }}#updates">email</a>.</p>
  </div>
</section>
{{ end }}
