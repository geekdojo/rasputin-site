{{ define "main" }}
<article class="band">
  <div class="wrap narrow">
    <p class="post-date muted">{{ .Date.Format "January 2, 2006" }} · devlog</p>
    <h1>{{ .Title }}</h1>
    <div class="prose">
      {{ .Content }}
    </div>
    <hr class="rule">
    <p class="muted">Want the next one in your inbox? <a href="{{ "/" | relURL }}#updates">Subscribe</a>,
    or grab the <a href="{{ "devlog/index.xml" | relURL }}">RSS feed</a>.
    Found something broken? <a href="{{ site.Params.partnerIssueUrl }}">We're recruiting design partners.</a></p>
  </div>
</article>
{{ end }}
