baseURL = "https://rasputin.geekdojo.com/"
locale = "en-us"
title = "Rasputin"
timeZone = "America/Los_Angeles"
enableRobotsTXT = true
disableKinds = ["taxonomy", "term"]

[params]
  description = "Rasputin is an open-source homelab cluster system: Raspberry Pi and Intel N100 nodes plus a dedicated firewall node, managed from one web UI — opinionated where you want guidance, open where you want control, and built to work in the first hour."
  # Kit (ConvertKit) form ID — leave empty to show the GitHub-watch fallback
  # instead of the email form. Set it and the form goes live; nothing else to do.
  kitFormId = "9667090"
  # The /download/ page is the image front door now; these back the "all
  # releases" link and point at the OS source repo (ADR-0002 — the
  # rasputin-releases mirror is retired).
  downloadUrl = "https://github.com/geekdojo/rasputin-os/releases"
  releasesUrl = "https://github.com/geekdojo/rasputin-os/releases"
  # Design-partner intake lands on the control-plane repo's issues (the mirror is
  # retired — ADR-0002).
  docIssueUrl = "https://github.com/geekdojo/rasputin-site/issues/new?title=Docs Issue"
  partnerIssueUrl = "https://github.com/geekdojo/rasputin-control-plane/issues/new?title=design%20partner"
  githubUrl = "https://github.com/geekdojo"
  blueskyUrl = "https://bsky.app/profile/hoodoo5x5.bsky.social"
  lemmyUrl = "https://lemmy.world/u/hoodoo5x5"
  # mastodonUrl = "https://hachyderm.io/@hoodoo5x5"  # enable once the instance approves the account
  parentUrl = "https://geekdojo.com"

[mediaTypes."text/markdown"]
  suffixes = ["md"]

# Agent-facing outputs: raw-markdown mirrors of docs pages (opted in via the
# docs section cascade), plus /llms.txt and /releases.json rendered from the
# home page. data/releases.json is refreshed in CI (daily + on release), so
# the published /releases.json tracks the latest stable automatically.
[outputFormats.markdown]
  mediaType = "text/markdown"
  baseName = "index"
  isPlainText = true

[outputFormats.llms]
  mediaType = "text/plain"
  baseName = "llms"
  isPlainText = true

[outputFormats.releases-json]
  mediaType = "application/json"
  baseName = "releases"
  isPlainText = true

[outputs]
  home = ["html", "llms", "releases-json"]
  section = ["html", "rss"]

[markup.goldmark.renderer]
  unsafe = true

[minify]
  minifyOutput = true
