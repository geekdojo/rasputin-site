name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Refresh the resolved "latest release" data daily, and on demand when a source
  # repo publishes a release (it sends a repository_dispatch of this type).
  schedule:
    - cron: "17 8 * * *"
  repository_dispatch:
    types: [release-published]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.164.0"
    steps:
      - uses: actions/checkout@v4
      - name: Install Hugo
        run: |
          curl -sSL -o "${{ runner.temp }}/hugo.deb" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${{ runner.temp }}/hugo.deb"
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Resolve latest releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/fetch-releases.sh
      - name: Build
        run: hugo --minify --baseURL "${{ steps.pages.outputs.base_url }}/"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
